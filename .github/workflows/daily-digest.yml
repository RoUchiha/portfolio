name: Daily AI Digest

# Reliable replacement for Vercel's Hobby-plan cron (which does not fire on time).
# Triggers the deployed digest endpoint every morning at ~9:00 America/Chicago.
#
# GitHub Actions cron is UTC-only AND best-effort: runs can be delayed well past
# the scheduled minute (on 2026-07-09 the 14:00/15:00 UTC triggers ran at 16:30
# and 17:23 UTC). So this workflow is designed for guaranteed delivery rather
# than exact timing:
#
#   - Three staggered triggers (14:07, 15:07, 16:07 UTC) at an off-hour minute
#     to avoid the congested on-the-hour slots.
#   - The gate proceeds whenever the America/Chicago hour is >= 9, so a delayed
#     run still delivers (never silently skips the day).
#   - In winter (CST), 14:07 UTC = 8:07 local -> gate skips it; 15:07 UTC = 9:07
#     local generates. In summer (CDT), 14:07 UTC = 9:07 local generates. This
#     keeps the send at/after 9am local year-round across DST changes.
#   - Duplicate protection: the endpoint is idempotent (returns already_exists
#     once the day's row is stored, without re-sending email), and the
#     concurrency group serializes overlapping runs so two triggers can't race.

on:
  schedule:
    - cron: "7 14 * * *"   # 9:07am CDT (summer) / 8:07am CST (winter, gated off)
    - cron: "7 15 * * *"   # 10:07am CDT (no-op, already sent) / 9:07am CST (winter send)
    - cron: "7 16 * * *"   # backstop if an earlier trigger was dropped/delayed
  workflow_dispatch: {}    # manual runs from the Actions tab (always proceed)

permissions: {}            # this workflow needs no repository access

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: 9am-Central gate (DST- and delay-safe)
        id: gate
        run: |
          HOUR=$(TZ="America/Chicago" date +%-H)
          echo "America/Chicago hour is $HOUR (event: $GITHUB_EVENT_NAME)"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$HOUR" -ge 9 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Before 9am Central (winter early trigger) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger digest generation
        if: steps.gate.outputs.run == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in repo Settings → Secrets → Actions"
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            --max-time 300 \
            -X POST "https://portfolio-nine-swart-38.vercel.app/api/digests/generate" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json" \
            -d '{}')
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Digest generation failed (HTTP $code)"
            exit 1
          fi
          echo "Digest trigger succeeded."
